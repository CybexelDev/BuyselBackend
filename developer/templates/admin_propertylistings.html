{% csrf_token %}

<!-- CATEGORY -->
        <div>
            <label class="block mb-2 text-sm font-semibold text-gray-700">
                <i class="fa-solid fa-layer-group mr-1 text-[#8bc83f]"></i> Category
            </label>

            <select name="category" id="categorySelect">
                <option value="">Select Category</option>

                {% for cat in categories %}
                <option value="{{cat.id}}">{{cat.name}}</option>
                {% endfor %}

            </select>

        </div>


        <!-- SUBCATEGORY -->
        <div>
            <label class="block mb-2 text-sm font-semibold text-gray-700">

            <select name="subcategory" id="subcategorySelect">
            <option value="">&#45;&#45; Select Subcategory &#45;&#45;</option>

            </select>
        </div>


        <!-- PURPOSE -->
        <div>
            <label class="block mb-2 text-sm font-semibold text-gray-700">
                <i class="fa-solid fa-bullseye mr-1 text-[#8bc83f]"></i> Purpose
            </label>

            <select name="purpose" id="purpose">
                <option value="">Select Purpose</option>
                {% for p in purposes %}
                <option value="{{p.id}}">{{p.name}}</option>
                {% endfor %}

            </select>
        </div>

<script>

let selectedAmenities = new Set();

function openAmenityModal(){
document.getElementById("amenityModal").classList.remove("hidden");
document.getElementById("amenityModal").classList.add("flex");
}

function closeAmenityModal(){
document.getElementById("amenityModal").classList.add("hidden");
}


/* SELECT / DESELECT BUTTON */

document.addEventListener("click", function(e){

if(e.target.classList.contains("amenity-btn")){

let btn = e.target;
let id = btn.dataset.id;

if(selectedAmenities.has(id)){

selectedAmenities.delete(id);
btn.classList.remove("bg-[#8bc83f]","text-white");

}else{

selectedAmenities.add(id);
btn.classList.add("bg-[#8bc83f]","text-white");

}

updateSelectedCount();

}

});


/* UPDATE COUNTER */

function updateSelectedCount(){

let count = selectedAmenities.size;

if(document.getElementById("selectedCount")){
document.getElementById("selectedCount").innerText = count;
}

}


/* CLEAR SELECTION */

function clearAmenities(){

selectedAmenities.clear();

document.querySelectorAll(".amenity-btn").forEach(btn=>{
btn.classList.remove("bg-[#8bc83f]","text-white");
});

updateSelectedCount();

}


/* SEARCH */

document.addEventListener("DOMContentLoaded", function(){

let searchInput = document.getElementById("amenitySearch");

if(searchInput){

searchInput.addEventListener("keyup", function(){

let value = this.value.toLowerCase();

document.querySelectorAll(".amenity-btn").forEach(btn=>{

let name = btn.dataset.name.toLowerCase();

btn.style.display = name.includes(value) ? "block" : "none";

});

});

}

});


/* SAVE TO DJANGO FORM */

function saveAmenities(){

let names = [];
let hiddenHTML = "";

document.querySelectorAll(".amenity-btn").forEach(btn=>{

let id = btn.dataset.id;
let name = btn.dataset.name;

if(selectedAmenities.has(id)){

names.push(name);

hiddenHTML += `<input type="hidden" name="amenities" value="${id}">`;

}

});

document.getElementById("amenities_display").value = names.join(", ");
document.getElementById("amenities_hidden").innerHTML = hiddenHTML;

closeAmenityModal();

}

</script>

<script>

const categorySelect = document.getElementById("categorySelect");
const subcategorySelect = document.getElementById("subcategorySelect");
const dynamicContainer = document.getElementById("dynamicFieldsContainer");

/* LOAD SUBCATEGORIES */
categorySelect.addEventListener("change", function () {

    let categoryId = this.value;

    if (!categoryId) return;

    fetch(`/admin_panel/get-subcategories/${categoryId}/`)
    .then(res => res.json())
    .then(data => {

        let tomSub = subcategorySelect.tomselect;

        tomSub.clearOptions();
        tomSub.addOption({ value: "", text: "Select Subcategory" });

        data.forEach(sub => {
            tomSub.addOption({ value: sub.id, text: sub.name });
        });

        tomSub.refreshOptions(false);
        tomSub.setValue("");
    });

});

/* LOAD SUBCATEGORY FIELDS */
subcategorySelect.addEventListener("change", function () {

    let subcategoryId = this.value;

    if (!subcategoryId) return;

    fetch(`/admin_panel/get-subcategory-fields/${subcategoryId}/`)
    .then(res => res.json())
    .then(data => {

        dynamicContainer.innerHTML = "";

        data.forEach(field => {

            /* NUMBER FIELD */
            if (field.type === "number") {

                dynamicContainer.innerHTML += `
                <div class="number border rounded-lg p-2 gap-3 flex flex-col h-40 items-center justify-center text-center cursor-pointer hover:bg-green-100 transition"
                     onclick="highlightBox(this)">

                     <img src="${field.icon}" class="w-6 h-6 mb-1" alt="">
                    <label class="text-sm font-medium mb-1">${field.name}</label>

                    <div class="flex items-center gap-1">
                        <button type="button" onclick="decreaseValue('field_${field.id}'); event.stopPropagation();"
                                class="w-7 h-7  rounded text-sm"><i class="fa-solid fa-minus"></i></button>

                        <input type="number" id="field_${field.id}" name="field_${field.id}" value="0"
                               class="w-12 text-center bg-transparent text-sm" onclick="event.stopPropagation()">

                        <button type="button" onclick="increaseValue('field_${field.id}'); event.stopPropagation();"
                                class="w-7 h-7  rounded text-sm"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                `;
            }

            /* BOOLEAN FIELD */
            else if (field.type === "boolean") {

                dynamicContainer.innerHTML += `
                <div class="number border rounded-lg p-2 gap-3 flex flex-col items-center justify-center text-center cursor-pointer hover:bg-green-100 transition"
                     onclick="toggleCheckbox(this)">
                      <img src="${field.icon}" class="w-6 h-6 mb-1" alt="">
                    <input type="checkbox" name="field_${field.id}" class="w-4 h-4 mb-1" onclick="event.stopPropagation()">
                    <label class="text-sm font-medium">${field.name}</label>
                </div>
                `;
            }

            /* TEXT FIELD */
            else {

                dynamicContainer.innerHTML += `
                <div class=" border rounded-lg p-2 gap-3 flex flex-col items-center justify-center text-center cursor-pointer hover:bg-green-100 transition"
                     onclick="highlightBox(this)">
                      <img src="${field.icon}" class="w-6 h-6 mb-1" alt="">
                    <label class="text-sm font-medium mb-1">${field.name}</label>
                    <input type="text" name="field_${field.id}" class=" w-1/2 text-center  text-sm" onclick="event.stopPropagation()">
                </div>
                `;
            }

        });

    });

});

/* INCREASE / DECREASE FUNCTIONS */
function increaseValue(id){
    let input = document.getElementById(id);
    input.value = parseInt(input.value || 0) + 1;
}
function decreaseValue(id){
    let input = document.getElementById(id);
    let val = parseInt(input.value || 0);
    if(val > 0) input.value = val - 1;
}

/* HIGHLIGHT BOX ON CLICK */
function highlightBox(el){
    // remove highlight from all boxes
    const boxes = document.querySelectorAll('#dynamicFieldsContainer > div');
    boxes.forEach(b => b.classList.remove('bg-green-200'));
    // highlight clicked
    el.classList.add('bg-green-200');
}

/* TOGGLE BOOLEAN CHECKBOX BOX */
function toggleCheckbox(el){
    const checkbox = el.querySelector('input[type="checkbox"]');
    checkbox.checked = !checkbox.checked;
    if(checkbox.checked) el.classList.add('bg-green-200');
    else el.classList.remove('bg-green-200');
}

</script>
