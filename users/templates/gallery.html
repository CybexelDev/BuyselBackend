<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RWF8CT8ZD4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-RWF8CT8ZD4');
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Image Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="text-gray-800">
{% load static %}

<div class="p-4 mt-16">
  <a href="{% url 'property_detail' property.id %}"
     class="inline-block px-4 py-2 bg-[#8bc83f] text-white rounded-md shadow hover:bg-green-600">
    ← Back
  </a>
</div>

<!-- IMAGE GRID -->
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mt-6 px-[130px] max-md:px-[16px]">

  <!-- MAIN IMAGE -->
  {% if property.image %}
    <div class="relative rounded-lg overflow-hidden">
      <img src="{{ property.image.url }}"
           onclick="openViewer(0)"
           class="w-full h-60 object-cover cursor-pointer shadow" />

      <!-- Watermark -->
      <img src="{% static 'img/watermark.png' %}"
           class="absolute top-1/2 left-1/2 z-10
                  -translate-x-1/2 -translate-y-1/2
                  w-[160px] opacity-40
                  pointer-events-none select-none">
    </div>
  {% endif %}

  <!-- EXTRA IMAGES -->
  {% for img in extra_images %}
    {% if img.image %}
      <div class="relative rounded-lg overflow-hidden">
        <img src="{{ img.image.url }}"
             onclick="openViewer({% if property.image %}{{ forloop.counter }}{% else %}{{ forloop.counter0 }}{% endif %})"
             class="w-full h-60 object-cover cursor-pointer shadow" />

        <!-- Watermark -->
        <img src="{% static 'img/watermark.png' %}"
             class="absolute top-1/2 left-1/2 z-10
                    -translate-x-1/2 -translate-y-1/2
                    w-[160px] opacity-40
                    pointer-events-none select-none">
      </div>
    {% endif %}
  {% endfor %}

</div>

<!-- IMAGE VIEWER MODAL -->
<div id="imageViewer"
     class="fixed inset-0 bg-black bg-opacity-80 hidden items-center justify-center z-50 px-6">

  <div class="relative max-w-4xl w-full mx-auto">

    <!-- Image + Watermark -->
    <div class="relative">
      <img id="mainImage"
           src
           alt="Full View"
           class="w-full h-[500px] object-cover rounded-lg shadow" />

      <!-- Modal Watermark -->
      <img src="{% static 'img/watermark.png' %}"
           class="absolute top-1/2 left-1/2 z-30
                  -translate-x-1/2 -translate-y-1/2
                  w-[300px] opacity-35
                  pointer-events-none select-none">
    </div>

    <!-- Prev -->
    <button onclick="changeImage(-1)"
            class="absolute left-4 top-1/2 -translate-y-1/2 bg-white p-3 rounded-full shadow hover:bg-gray-200 z-40">
      ‹
    </button>

    <!-- Next -->
    <button onclick="changeImage(1)"
            class="absolute right-4 top-1/2 -translate-y-1/2 bg-white p-3 rounded-full shadow hover:bg-gray-200 z-40">
      ›
    </button>

    <!-- Close -->
    <button onclick="closeViewer()"
            class="absolute top-4 right-4 bg-white text-black px-3 py-1 rounded-full hover:bg-gray-300 z-40">
      ✕
    </button>

  </div>
</div>

<script>
  const propertyImages = [
    {% if property.image %}"{{ property.image.url }}",{% endif %}
    {% for img in extra_images %}
      {% if img.image %}"{{ img.image.url }}",{% endif %}
    {% endfor %}
  ];

  let currentIndex = 0;

  function openViewer(index) {
    currentIndex = index;
    document.getElementById("mainImage").src = propertyImages[currentIndex];
    document.getElementById("imageViewer").classList.remove("hidden");
    document.getElementById("imageViewer").classList.add("flex");
  }

  function closeViewer() {
    document.getElementById("imageViewer").classList.add("hidden");
    document.getElementById("imageViewer").classList.remove("flex");
  }

  function changeImage(direction) {
    currentIndex = (currentIndex + direction + propertyImages.length) % propertyImages.length;
    document.getElementById("mainImage").src = propertyImages[currentIndex];
  }
</script>

</body>
</html>
