<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<!-- GLOBAL SHARE MODAL -->
<div
  id="shareModal"
  class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden"
>
  <div class="bg-white rounded-lg p-6 w-80 shadow-lg relative">
    <button
      id="closeShareModal"
      class="absolute top-2 right-2 text-gray-600 hover:text-black"
    >
      ✕
    </button>

    <h2 class="text-lg font-semibold mb-4 text-center">Share this Property</h2>

    <!-- Preview Image -->
    <img
      id="sharePreviewImage"
      class="w-full rounded-lg mb-4 shadow hidden"
      alt="Preview"
    />

    <!-- Links -->
    <div class="flex flex-col space-y-3" id="shareLinks"></div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const modal = document.getElementById("shareModal");
    const closeModal = document.getElementById("closeShareModal");
    const previewImg = document.getElementById("sharePreviewImage");
    const shareLinks = document.getElementById("shareLinks");

    // Open modal listener
    document.querySelectorAll(".openShareModal").forEach((button) => {
      button.addEventListener("click", function () {
        const label = this.dataset.label || "Property";
        const price = this.dataset.price || "";
        const description = this.dataset.description || "";
        const image = this.dataset.image || ""; // screenshot or main image
        const url =
          this.dataset.url || window.location.href; // fallback if not provided

        // Set preview image
        if (image) {
          previewImg.src = image;
          previewImg.classList.remove("hidden");
        } else {
          previewImg.classList.add("hidden");
        }

        // Generate share links
        shareLinks.innerHTML = `
          <a href="https://api.whatsapp.com/send?text=${encodeURIComponent(
            label + "\\n" + description + "\\n" + url
          )}"
            target="_blank"
            class="px-4 py-2 bg-green-500 text-white rounded text-center"
          >
            WhatsApp
          </a>

          <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(
            url
          )}"
            target="_blank"
            class="px-4 py-2 bg-blue-600 text-white rounded text-center"
          >
            Facebook
          </a>

          <a href="https://t.me/share/url?url=${encodeURIComponent(
            url
          )}&text=${encodeURIComponent(label)}"
            target="_blank"
            class="px-4 py-2 bg-blue-500 text-white rounded text-center"
          >
            Telegram
          </a>

          <button id="copyLinkBtn"
            class="px-4 py-2 bg-gray-800 text-white rounded text-center"
          >
            Copy Link
          </button>
        `;

        // Copy Link Event
        setTimeout(() => {
          const copyBtn = document.getElementById("copyLinkBtn");
          if (copyBtn) {
            copyBtn.addEventListener("click", () => {
              navigator.clipboard.writeText(url);
              copyBtn.innerText = "Copied!";
              setTimeout(() => (copyBtn.innerText = "Copy Link"), 2000);
            });
          }
        }, 100);

        modal.classList.remove("hidden");
      });
    });

    closeModal.addEventListener("click", () => modal.classList.add("hidden"));
    modal.addEventListener("click", (e) => {
      if (e.target === modal) modal.classList.add("hidden");
    });
  });
</script>

</body>
</html>
